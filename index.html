<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine Zentrale | Pro</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeuZLf52JxlN_V3T9_sFqMDccHN8hDP9w",
            authDomain: "meine-zentrale.firebaseapp.com",
            projectId: "meine-zentrale",
            storageBucket: "meine-zentrale.firebasestorage.app",
            messagingSenderId: "1026890917523",
            appId: "1:1026890917523:web:78278ef14b8e89b0868f66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (e) { alert("Fehler: " + e.message); }
        };

        window.handleSubmit = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const mode = document.getElementById('mainBtn').dataset.mode;
            try {
                if (mode === 'register') {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert("Fehler: " + e.message); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            document.getElementById('dashboardSection').style.display = user ? 'block' : 'none';
            if (user) loadLinks(user.uid);
        });

        window.addFav = async () => {
            const name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            if (name && url && auth.currentUser) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const docRef = doc(db, "users", auth.currentUser.uid);
                const snap = await getDoc(docRef);
                let links = snap.exists() ? snap.data().links : [];
                links.push({ name, url });
                await setDoc(docRef, { links });
            }
        };

        window.deleteFav = async (index) => {
            const docRef = doc(db, "users", auth.currentUser.uid);
            const snap = await getDoc(docRef);
            let links = snap.data().links;
            links.splice(index, 1);
            await setDoc(docRef, { links });
        };

        function loadLinks(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const grid = document.getElementById('dynamicGrid');
                const links = doc.exists() ? doc.data().links : [];
                grid.innerHTML = links.map((l, i) => `
                    <div class="card dynamic-card">
                        <button class="btn-del" onclick="deleteFav(${i})">×</button>
                        <a href="${l.url}" target="_blank">
                            <img src="https://www.google.com/s2/favicons?sz=64&domain=${new URL(l.url).hostname}" class="icon">
                            <span>${l.name}</span>
                        </a>
                    </div>`).join('');
            });
        }
    </script>

    <style>
        :root {
            --glow-cyan: rgba(0, 242, 254, 0.5);
            --glow-red: rgba(255, 60, 60, 0.5);
            --glow-green: rgba(60, 255, 60, 0.4);
        }

        body {
            margin: 0; background: #0f172a; color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        /* Sprach- & Settings-Bar */
        .top-nav {
            width: 100%; display: flex; justify-content: flex-end; padding: 15px; gap: 15px; box-sizing: border-box;
        }
        .nav-icon { font-size: 1.5rem; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .nav-icon:hover { opacity: 1; transform: rotate(45deg); }

        /* Login */
        #authSection { height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .login-card { 
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 320px;
        }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #1e293b; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #4facfe; color: white; font-weight: bold; cursor: pointer; }
        .btn-google { background: white; color: #333; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Dashboard */
        #dashboardSection { display: none; width: 90%; max-width: 600px; text-align: center; }
        h1 { font-size: 2rem; margin: 20px 0; text-shadow: 0 0 10px var(--glow-cyan); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        
        .card {
            background: rgba(255,255,255,0.07); border-radius: 18px; padding: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            text-decoration: none; color: white; position: relative; border-bottom: 3px solid transparent;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .yt { border-color: #ff4444; box-shadow: 0 10px 20px var(--glow-red); }
        .tool { border-color: #4facfe; box-shadow: 0 10px 20px var(--glow-cyan); }
        .search { border-color: #00ff88; box-shadow: 0 10px 20px var(--glow-green); }

        .icon { width: 40px; height: 40px; }
        .btn-del { position: absolute; top: 5px; right: 5px; background: none; border: none; color: gray; cursor: pointer; }

        .add-section { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <span class="nav-icon">🇩🇪</span>
        <span class="nav-icon">⚙️</span>
    </div>

    <div id="authSection">
        <div class="login-card">
            <h2>Zentrale Login</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="password" placeholder="Passwort">
            <button class="btn-main" id="mainBtn" data-mode="login" onclick="handleSubmit()">Anmelden</button>
            <button class="btn-main btn-google" onclick="loginWithGoogle()">
                <img src="https://www.google.com/s2/favicons?domain=google.com" width="18"> Google Login
            </button>
            <p onclick="toggleMode()" style="cursor:pointer; font-size: 0.8rem; margin-top: 15px;">Noch kein Account? Registrieren</p>
        </div>
    </div>

    <div id="dashboardSection">
        <h1>Meine Zentrale</h1>

        <div class="grid">
            <a href="https://youtube.com" class="card yt">
                <img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com" class="icon">
                <span>YouTube</span>
            </a>
            <a href="https://ublockorigin.com" class="card tool">
                <img src="https://www.google.com/s2/favicons?sz=64&domain=ublockorigin.com" class="icon">
                <span>uBlock installieren</span>
            </a>
            <a href="#" class="card tool" onclick="alert('Link hinzufügen-Funktion ist unten!')">
                <span style="font-size: 2rem;">+</span>
                <span>Link hinzufügen</span>
            </a>
            <a href="https://google.com" class="card search">
                <img src="https://www.google.com/s2/favicons?sz=64&domain=google.com" class="icon">
                <span>Suche</span>
            </a>
        </div>

        <div id="dynamicGrid" class="grid"></div>

        <div class="add-section">
            <h3>Schnell-Links speichern</h3>
            <input type="text" id="favName" placeholder="Name">
            <input type="text" id="favUrl" placeholder="URL (z.B. github.com)">
            <button class="btn-main" onclick="addFav()">Speichern ✨</button>
        </div>

        <button onclick="logout()" style="margin: 40px 0; background: none; border: none; color: gray; cursor: pointer;">Abmelden</button>
    </div>

    <script>
        function toggleMode() {
            const btn = document.getElementById('mainBtn');
            btn.dataset.mode = btn.dataset.mode === 'login' ? 'register' : 'login';
            btn.innerText = btn.dataset.mode === 'login' ? 'Anmelden' : 'Registrieren';
        }
    </script>
</body>
</html>
