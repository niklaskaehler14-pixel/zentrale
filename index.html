<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Zentrale</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #05070a;
            --bg-medium: #0f172a;
            --bg-light: #1e293b;
            --garden: #2ecc71;
        }

        body {
            margin: 0; padding: 20px; min-height: 100vh;
            /* Der edle, entspannte Verlauf */
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-medium), var(--bg-dark));
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; color: white;
        }

        /* Sprach-Umschalter oben rechts */
        .lang-switch {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px; border-radius: 12px;
            cursor: pointer; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s; z-index: 100;
        }
        .lang-switch:hover { background: rgba(255, 255, 255, 0.15); }

        /* Das Grid für die Hauptbuttons */
        .main-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; width: 100%; max-width: 600px;
            margin-bottom: 20px; margin-top: 20px;
        }

        .fav-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px; width: 100%; max-width: 600px;
            margin-bottom: 40px;
        }

        .card, .fav-card-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 20px;
            text-align: center; text-decoration: none; color: white;
            font-weight: bold; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative; overflow: hidden; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .card:hover, .fav-card-item:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.2);
        }

        .favicon { width: 32px; height: 32px; border-radius: 8px; }

        /* Individuelle Boden-Leiste für die Buttons */
        .yt-card { border-bottom: 4px solid #ff0000; }
        .ublock-card { border-bottom: 4px solid #800000; }
        .garden-card { border-bottom: 4px solid var(--garden); } /* Der neue Garten-Button */
        .search-card { border-bottom: 4px solid var(--primary); }

        .manager-section {
            width: 90%; max-width: 600px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 25px; padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
        }

        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input { 
            padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2); color: white; outline: none;
        }

        .btn-add {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none; padding: 14px; border-radius: 12px; color: #0b0e14;
            font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-add:hover { opacity: 0.9; transform: scale(0.98); }

        .btn-del {
            position: absolute; top: 8px; right: 8px;
            background: rgba(233, 69, 96, 0.9); border: none; 
            border-radius: 50%; color: white; width: 24px; height: 24px;
            font-size: 14px; cursor: pointer; display: none;
        }
        .fav-card-item:hover .btn-del { display: block; }

    </style>
</head>
<body>

    <div class="lang-switch" onclick="toggleLang()" id="langBtn">🇩🇪 DE</div>

    <h1 id="title" style="margin-top: 40px; font-weight: 300; letter-spacing: 2px; text-shadow: 0 0 15px rgba(0,242,254,0.3);">Meine Zentrale</h1>

    <div class="main-grid">
        <a href="https://www.youtube.com" target="_blank" class="card yt-card">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com" class="favicon">
            YouTube
        </a>
        <a href="https://ublockorigin.com/" target="_blank" class="card ublock-card">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=ublockorigin.com" class="favicon">
            <span id="btnUblock">uBlock</span>
        </a>
        <a href="https://www.google.com/search?q=garten+ideen" target="_blank" class="card garden-card">
            <span>🌿</span>
            <span id="btnGarden">Garten</span>
        </a>
        <div onclick="document.getElementById('favName').focus();" class="card search-card">
            <span>➕</span>
            <span id="btnAddLink">Link dazu</span>
        </div>
    </div>

    <div id="favGrid" class="fav-grid"></div>

    <div class="manager-section">
        <h3 id="managerTitle" style="margin-top:0; font-weight: 400;">Schnell-Links speichern</h3>
        <div class="input-group">
            <input type="text" id="favName" placeholder="Name">
            <input type="text" id="favUrl" placeholder="URL (z.B. github.com)">
            <button class="btn-add" id="btnAddSubmit" onclick="addFav()">Hinzufügen</button>
        </div>
    </div>

    <script>
        let currentLang = 'de';
        const texts = {
            de: { title: "Meine Zentrale", ublock: "uBlock", garden: "Garten", addLink: "Link dazu", manager: "Schnell-Links speichern", submit: "Hinzufügen", btn: "🇩🇪 DE" },
            en: { title: "My Central", ublock: "uBlock", garden: "Garden", addLink: "Add Link", manager: "Save Quick-Links", submit: "Add now", btn: "🇺🇸 EN" }
        };

        function toggleLang() {
            currentLang = currentLang === 'de' ? 'en' : 'de';
            const t = texts[currentLang];
            document.getElementById('title').innerText = t.title;
            document.getElementById('btnUblock').innerText = t.ublock;
            document.getElementById('btnGarden').innerText = t.garden;
            document.getElementById('btnAddLink').innerText = t.addLink;
            document.getElementById('managerTitle').innerText = t.manager;
            document.getElementById('btnAddSubmit').innerText = t.submit;
            document.getElementById('langBtn').innerText = t.btn;
        }

        document.addEventListener('DOMContentLoaded', displayFavs);

        function addFav() {
            let name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            if (name && url) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const favorites = JSON.parse(localStorage.getItem('myCentralFavs') || '[]');
                favorites.push({ name, url });
                localStorage.setItem('myCentralFavs', JSON.stringify(favorites));
                document.getElementById('favName').value = '';
                document.getElementById('favUrl').value = '';
                displayFavs();
            }
        }

        function displayFavs() {
            const grid = document.getElementById('favGrid');
            const favorites = JSON.parse(localStorage.getItem('myCentralFavs') || '[]');
            grid.innerHTML = favorites.map((fav, index) => {
                const domain = new URL(fav.url).hostname;
                return `
                    <div class="fav-card-item">
                        <button class="btn-del" onclick="deleteFav(${index})">×</button>
                        <a href="${fav.url}" target="_blank" style="text-decoration:none; color:white; display:flex; flex-direction:column; align-items:center; gap:8px;">
                            <img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="favicon" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=google.com'">
                            <span style="font-size: 0.85rem; opacity: 0.9;">${fav.name}</span>
                        </a>
                    </div>
                `;
            }).join('');
        }

        function deleteFav(index) {
            const favorites = JSON.parse(localStorage.getItem('myCentralFavs') || '[]');
            favorites.splice(index, 1);
            localStorage.setItem('myCentralFavs', JSON.stringify(favorites));
            displayFavs();
        }
    </script>
</body>
</html>
