<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meine Zentrale | Pro</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234facfe%22/><text y=%22.9em%22 font-size=%2280%22 x=%22.1em%22>Z</text></svg>">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Meine%20Zentrale%22,%22short_name%22:%22Zentrale%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f172a%22,%22theme_color%22:%22%234facfe%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/5968/5968841.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeuZLf52JxlN_V3T9_sFqMDccHN8hDP9w",
            authDomain: "meine-zentrale.firebaseapp.com",
            projectId: "meine-zentrale",
            storageBucket: "meine-zentrale.firebasestorage.app",
            messagingSenderId: "1026890917523",
            appId: "1:1026890917523:web:78278ef14b8e89b0868f66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Service Worker für PWA-Funktion registrieren
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(event){});');
        }

        window.openResetModal = () => document.getElementById('resetModal').style.display = 'flex';
        window.closeResetModal = () => document.getElementById('resetModal').style.display = 'none';

        window.sendResetEmail = async () => {
            const email = document.getElementById('resetEmailInput').value;
            if (!email) return alert("E-Mail?");
            try {
                await sendPasswordResetEmail(auth, email);
                alert("E-Mail gesendet!");
                closeResetModal();
            } catch (e) { alert(e.message); }
        };

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');
            if (oobCode) {
                try {
                    await verifyPasswordResetCode(auth, oobCode);
                    document.getElementById('newPassModal').style.display = 'flex';
                    window.currentOobCode = oobCode;
                } catch (e) { alert("Link ungültig."); }
            }
        };

        window.saveNewPassword = async () => {
            const newPass = document.getElementById('newPassInput').value;
            if (newPass.length < 6) return alert("Zu kurz!");
            try {
                await confirmPasswordReset(auth, window.currentOobCode, newPass);
                alert("Passwort geändert!");
                window.location.href = window.location.pathname; 
            } catch (e) { alert(e.message); }
        };

        let currentLang = 'de';
        const translations = {
            de: { title: "Meine Zentrale", login: "Anmelden", reg: "Registrieren", add: "Link speichern", save: "Speichern ✨", name: "Name", url: "URL", switch: "Registrieren", logout: "Abmelden", settings: "Settings", forgot: "Passwort vergessen?", search: "Suche", addTile: "Link +" },
            en: { title: "My Central", login: "Login", reg: "Register", add: "Save Link", save: "Save ✨", name: "Name", url: "URL", switch: "Register", logout: "Logout", settings: "Settings", forgot: "Forgot?", search: "Search", addTile: "Link +" }
        };

        window.toggleLang = () => {
            currentLang = currentLang === 'de' ? 'en' : 'de';
            document.getElementById('langBtn').innerText = currentLang === 'de' ? '🇩🇪' : '🇺🇸';
            updateUI();
        };

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (el.tagName === 'INPUT') el.placeholder = t[key];
                else el.innerText = t[key];
            });
        }

        window.scrollToAdd = (e) => {
            e.preventDefault();
            document.getElementById('addSection').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('favName').focus();
        };

        window.handleSubmit = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const mode = document.getElementById('mainBtn').dataset.mode;
            try {
                if (mode === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };
        
        window.logout = () => { signOut(auth); toggleSettings(); };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            document.getElementById('dashboardSection').style.display = user ? 'block' : 'none';
            document.getElementById('topNav').style.display = user ? 'flex' : 'none';
            if (user) {
                document.getElementById('userEmailDisplay').innerText = user.email;
                loadLinks(user.uid);
            }
        });

        window.addFav = async () => {
            const name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            const saveBtn = document.querySelector('.add-section .btn-main');
            if (name && url && auth.currentUser) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const docRef = doc(db, "users", auth.currentUser.uid);
                const snap = await getDoc(docRef);
                let links = snap.exists() ? snap.data().links : [];
                links.push({ name, url });
                await setDoc(docRef, { links });
                saveBtn.classList.add('btn-glow-active');
                setTimeout(() => saveBtn.classList.remove('btn-glow-active'), 600);
                document.getElementById('favName').value = ''; 
                document.getElementById('favUrl').value = '';
            }
        };

        window.deleteFav = async (index) => {
            const docRef = doc(db, "users", auth.currentUser.uid);
            const snap = await getDoc(docRef);
            let links = snap.data().links;
            links.splice(index, 1);
            await setDoc(docRef, { links });
        };

        function loadLinks(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const grid = document.getElementById('dynamicGrid');
                const links = doc.exists() ? doc.data().links : [];
                grid.innerHTML = links.map((l, i) => {
                    const domain = new URL(l.url).hostname;
                    return `<div class="card"><button class="btn-del" onclick="deleteFav(${i})">×</button><a href="${l.url}" target="_blank" class="fav-link-area"><img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" class="icon"><span class="fav-label">${l.name}</span></a></div>`;
                }).join('');
            });
        }

        window.toggleSettings = () => {
            const modal = document.getElementById('settingsModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        };
    </script>

    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .top-nav { width: 100%; display: none; justify-content: flex-end; padding: 15px; gap: 15px; position: fixed; top: 0; z-index: 500; }
        #dashboardSection { display: none; width: 95%; max-width: 1000px; text-align: center; padding-top: 70px; padding-bottom: 50px; }
        h1 { font-size: 2rem; text-shadow: 0 0 10px rgba(79, 172, 254, 0.4); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 18px; } h1 { font-size: 2.8rem; } }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.2s ease; overflow: hidden; min-height: 110px; will-change: transform; }
        .card::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #4facfe; opacity: 0.6; }
        .card:active { transform: scale(0.95); }
        @media (min-width: 600px) { .card:hover { transform: translateY(-3px); border-color: #4facfe; } }
        .btn-glow-active { animation: quickGlow 0.6s ease-out; }
        @keyframes quickGlow { 0% { filter: brightness(1); transform: scale(1); } 50% { filter: brightness(1.5); transform: scale(1.02); } 100% { filter: brightness(1); transform: scale(1); } }
        .fav-link-area { text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .fav-label { margin-top: 8px; font-weight: bold; font-size: 0.95rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; }
        .icon { width: 36px; height: 36px; pointer-events: none; }
        .btn-del { position: absolute; top: 5px; right: 5px; background: none; border: none; color: white; opacity: 0.4; font-size: 1.1rem; padding: 5px; cursor: pointer; }
        .add-section { background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: left; margin-top: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0 12px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; font-size: 1rem; outline: none; }
        .btn-main { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #4facfe; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        #authSection { height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .login-card { background: #1e293b; padding: 25px; border-radius: 15px; width: 85%; max-width: 340px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; border: 1px solid #4facfe; }
    </style>
</head>
<body>
    <div class="top-nav" id="topNav">
        <span onclick="toggleLang()" style="cursor:pointer; font-size: 1.3rem;" id="langBtn">🇩🇪</span>
        <span onclick="toggleSettings()" style="cursor:pointer; font-size: 1.3rem;">⚙️</span>
    </div>

    <div id="authSection">
        <div class="login-card">
            <h2 data-t="login">Anmelden</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="password" placeholder="Passwort">
            <span onclick="openResetModal()" style="font-size: 0.8rem; color: #4facfe; cursor: pointer; display: block; margin: 10px 0; text-align: right;" data-t="forgot">Passwort vergessen?</span>
            <button class="btn-main" id="mainBtn" data-mode="login" onclick="handleSubmit()" data-t="login">Anmelden</button>
            <p onclick="toggleMode()" style="cursor:pointer; font-size: 0.85rem; opacity: 0.6; margin-top: 15px;" data-t="switch">Registrieren</p>
        </div>
    </div>

    <div id="dashboardSection">
        <h1 data-t="title">Meine Zentrale</h1>
        <div class="grid">
            <a href="https://youtube.com" target="_blank" class="card">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com" class="icon">
                <span class="fav-label">YouTube</span>
            </a>
            <a href="#" onclick="scrollToAdd(event)" class="card">
                <span style="font-size: 1.8rem;">+</span>
                <span class="fav-label" data-t="addTile">Link hinzufügen</span>
            </a>
            <a href="https://google.com" target="_blank" class="card">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=google.com" class="icon">
                <span class="fav-label" data-t="search">Suche</span>
            </a>
        </div>
        <div id="dynamicGrid" class="grid"></div>
        <div class="add-section" id="addSection">
            <h3 data-t="add" style="margin-top:0">Schnell-Links</h3>
            <input type="text" id="favName" data-t="name" placeholder="Name">
            <input type="text" id="favUrl" data-t="url" placeholder="URL">
            <button class="btn-main" onclick="addFav()" data-t="save">Speichern ✨</button>
        </div>
    </div>

    <div id="resetModal" class="modal"><div class="modal-content"><h3>Reset</h3><input type="email" id="resetEmailInput" placeholder="E-Mail"><button class="btn-main" onclick="sendResetEmail()">Senden</button><p onclick="closeResetModal()" style="cursor:pointer; opacity:0.5; margin-top:15px">Abbrechen</p></div></div>
    <div id="newPassModal" class="modal"><div class="modal-content"><h3>Neues Passwort</h3><input type="password" id="newPassInput" placeholder="Min. 6 Zeichen"><button class="btn-main" onclick="saveNewPassword()">Speichern</button></div></div>
    <div id="settingsModal" class="modal" style="z-index:1000"><div class="modal-content"><h2>Settings</h2><p id="userEmailDisplay" style="font-size:0.8rem; color:#4facfe; margin-bottom:20px"></p><button class="btn-main" onclick="logout()" style="background:#ef4444">Abmelden</button><p onclick="toggleSettings()" style="cursor:pointer; opacity:0.5; margin-top:15px">Schließen</p></div></div>

    <script>
        function toggleMode() {
            const btn = document.getElementById('mainBtn');
            btn.dataset.mode = btn.dataset.mode === 'login' ? 'register' : 'login';
            btn.innerText = btn.dataset.mode === 'login' ? 'Anmelden' : 'Registrieren';
        }
    </script>
</body>
</html>
