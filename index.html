<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine Zentrale | Pro</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeuZLf52JxlN_V3T9_sFqMDccHN8hDP9w",
            authDomain: "meine-zentrale.firebaseapp.com",
            projectId: "meine-zentrale",
            storageBucket: "meine-zentrale.firebasestorage.app",
            messagingSenderId: "1026890917523",
            appId: "1:1026890917523:web:78278ef14b8e89b0868f66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- LOGIK FÜR PASSWORT RESET ---
        window.openResetModal = () => document.getElementById('resetModal').style.display = 'flex';
        window.closeResetModal = () => document.getElementById('resetModal').style.display = 'none';

        window.sendResetEmail = async () => {
            const email = document.getElementById('resetEmailInput').value;
            if (!email) return alert("Bitte E-Mail eingeben!");
            try {
                const actionCodeSettings = { url: "https://niklaskaehler14-pixel.github.io/zentrale/", handleCodeInApp: true };
                await sendPasswordResetEmail(auth, email, actionCodeSettings);
                alert("E-Mail gesendet! Klick auf den Link in der Mail.");
                closeResetModal();
            } catch (e) { alert(e.message); }
        };

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');
            if (oobCode) {
                try {
                    await verifyPasswordResetCode(auth, oobCode);
                    document.getElementById('newPassModal').style.display = 'flex';
                    window.currentOobCode = oobCode;
                } catch (e) { alert("Der Link ist abgelaufen oder ungültig."); }
            }
        };

        window.saveNewPassword = async () => {
            const newPass = document.getElementById('newPassInput').value;
            if (newPass.length < 6) return alert("Passwort zu kurz!");
            try {
                await confirmPasswordReset(auth, window.currentOobCode, newPass);
                alert("Passwort erfolgreich geändert! Du kannst dich jetzt einloggen.");
                window.location.href = window.location.pathname; 
            } catch (e) { alert(e.message); }
        };

        // --- SPRACHE & UI ---
        let currentLang = 'de';
        const translations = {
            de: { title: "Meine Zentrale", login: "Anmelden", reg: "Registrieren", add: "Schnell-Links speichern", save: "Speichern ✨", name: "Name", url: "URL (z.B. github.com)", switch: "Noch kein Account? Registrieren", logout: "Abmelden", settings: "Einstellungen", forgot: "Passwort vergessen?", search: "Suche", addTile: "Link hinzufügen" },
            en: { title: "My Central", login: "Login", reg: "Register", add: "Save Quick-Links", save: "Save ✨", name: "Name", url: "URL (e.g. github.com)", switch: "No account? Register", logout: "Logout", settings: "Settings", forgot: "Forgot password?", search: "Search", addTile: "Add Link" }
        };

        window.toggleLang = () => {
            currentLang = currentLang === 'de' ? 'en' : 'de';
            document.getElementById('langBtn').innerText = currentLang === 'de' ? '🇩🇪' : '🇺🇸';
            updateUI();
        };

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (el.tagName === 'INPUT') el.placeholder = t[key];
                else el.innerText = t[key];
            });
        }

        window.scrollToAdd = (e) => {
            e.preventDefault();
            document.getElementById('addSection').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('favName').focus();
        };

        // --- AUTH LOGIK ---
        window.handleSubmit = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const mode = document.getElementById('mainBtn').dataset.mode;
            try {
                if (mode === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };
        
        window.logout = () => { signOut(auth); toggleSettings(); };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            document.getElementById('dashboardSection').style.display = user ? 'block' : 'none';
            document.getElementById('topNav').style.display = user ? 'flex' : 'none';
            if (user) {
                document.getElementById('userEmailDisplay').innerText = user.email;
                loadLinks(user.uid);
            }
        });

        // --- FAVORITEN LOGIK ---
        window.addFav = async () => {
            const name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            if (name && url && auth.currentUser) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const docRef = doc(db, "users", auth.currentUser.uid);
                const snap = await getDoc(docRef);
                let links = snap.exists() ? snap.data().links : [];
                links.push({ name, url });
                await setDoc(docRef, { links });
                document.getElementById('favName').value = ''; document.getElementById('favUrl').value = '';
            }
        };

        window.deleteFav = async (index) => {
            const docRef = doc(db, "users", auth.currentUser.uid);
            const snap = await getDoc(docRef);
            let links = snap.data().links;
            links.splice(index, 1);
            await setDoc(docRef, { links });
        };

        function loadLinks(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const grid = document.getElementById('dynamicGrid');
                const links = doc.exists() ? doc.data().links : [];
                grid.innerHTML = links.map((l, i) => {
                    const domain = new URL(l.url).hostname;
                    return `<div class="card"><button class="btn-del" onclick="deleteFav(${i})">×</button><a href="${l.url}" target="_blank" class="fav-link-area"><img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" class="icon"><span class="fav-label">${l.name}</span></a></div>`;
                }).join('');
            });
        }

        window.toggleSettings = () => {
            const modal = document.getElementById('settingsModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        };
    </script>

    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .top-nav { width: 100%; display: none; justify-content: flex-end; padding: 15px; gap: 15px; position: fixed; top: 0; box-sizing: border-box; z-index: 500; }
        #dashboardSection { display: none; width: 90%; max-width: 800px; text-align: center; padding-top: 60px; padding-bottom: 50px; }
        h1 { font-size: 2.5rem; text-shadow: 0 0 20px rgba(79, 172, 254, 0.6); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: rgba(30, 41, 59, 0.7); border-radius: 16px; padding: 25px 20px; position: relative; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); transition: all 0.3s ease; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-decoration: none; color: white; justify-content: center; }
        .card::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #ff007a, #ff8a00, #00f2fe, #4facfe); background-size: 300% 300%; animation: glowGradient 4s ease infinite; opacity: 0.8; transition: all 0.4s ease; }
        .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4); border-color: rgba(255, 255, 255, 0.15); }
        .card:hover::before { height: 100%; opacity: 0.15; }
        @keyframes glowGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .fav-link-area { text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 2; }
        .fav-label { margin-top: 12px; font-weight: bold; font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .icon { width: 48px; height: 48px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
        .btn-del { position: absolute; top: 8px; right: 12px; background: none; border: none; color: white; opacity: 0.3; cursor: pointer; font-size: 1.2rem; z-index: 3; transition: opacity 0.2s; }
        .btn-del:hover { opacity: 1; color: #ef4444; }
        .add-section { background: rgba(30, 41, 59, 0.5); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: left; margin-top: 20px; }
        input { width: 100%; padding: 12px 15px; margin: 8px 0 15px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; font-size: 1rem; transition: border 0.3s; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(90deg, #00f2fe, #4facfe); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); }
        #authSection { height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .login-card { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .forgot-link { font-size: 0.85rem; color: #4facfe; cursor: pointer; display: block; margin: 15px 0; text-align: right; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { background: #1e293b; padding: 35px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; border: 1px solid #4facfe; box-shadow: 0 0 30px rgba(79, 172, 254, 0.2); }
    </style>
</head>
<body>

    <div class="top-nav" id="topNav">
        <span onclick="toggleLang()" style="cursor:pointer; font-size: 1.5rem;" id="langBtn">🇩🇪</span>
        <span onclick="toggleSettings()" style="cursor:pointer; font-size: 1.5rem;">⚙️</span>
    </div>

    <div id="authSection">
        <div class="login-card">
            <h2 data-t="login">Anmelden</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="password" placeholder="Passwort">
            <span class="forgot-link" onclick="openResetModal()" data-t="forgot">Passwort vergessen?</span>
            <button class="btn-main" id="mainBtn" data-mode="login" onclick="handleSubmit()" data-t="login">Anmelden</button>
            <p onclick="toggleMode()" style="cursor:pointer; font-size: 0.9rem; opacity: 0.7; margin-top: 20px;" data-t="switch">Registrieren</p>
        </div>
    </div>

    <div id="dashboardSection">
        <h1 data-t="title">Meine Zentrale</h1>
        
        <div class="grid">
            <a href="https://youtube.com" target="_blank" class="card">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com" class="icon">
                <span class="fav-label">YouTube</span>
            </a>
            
            <a href="#" onclick="scrollToAdd(event)" class="card">
                <span style="font-size: 2.5rem; line-height: 1; font-weight: bold; margin-bottom: -5px;">+</span>
                <span class="fav-label" data-t="addTile">Link hinzufügen</span>
            </a>
            
            <a href="https://google.com" target="_blank" class="card">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=google.com" class="icon">
                <span class="fav-label" data-t="search">Suche</span>
            </a>
        </div>
        
        <div id="dynamicGrid" class="grid"></div>
        
        <div class="add-section" id="addSection">
            <h3 data-t="add">Schnell-Links speichern</h3>
            <input type="text" id="favName" data-t="name" placeholder="Name">
            <input type="text" id="favUrl" data-t="url" placeholder="URL (z.B. github.com)">
            <button class="btn-main" onclick="addFav()" data-t="save">Speichern ✨</button>
        </div>
    </div>

    <div id="resetModal" class="modal"><div class="modal-content"><h3 style="margin-top:0">Passwort vergessen</h3><input type="email" id="resetEmailInput" placeholder="Deine E-Mail"><button class="btn-main" onclick="sendResetEmail()">Link senden</button><p onclick="closeResetModal()" style="cursor:pointer; opacity:0.5; margin-top:20px">Abbrechen</p></div></div>
    <div id="newPassModal" class="modal"><div class="modal-content"><h3 style="margin-top:0">Neues Passwort</h3><input type="password" id="newPassInput" placeholder="Min. 6 Zeichen"><button class="btn-main" onclick="saveNewPassword()">Passwort speichern</button></div></div>
    <div id="settingsModal" class="modal" style="z-index:1000"><div class="modal-content"><h2>Einstellungen</h2><p style="font-size:0.85rem; color:#a9a9a9">Angemeldet als:</p><p id="userEmailDisplay" style="font-weight:bold; color:#4facfe; margin-bottom:25px; word-break:break-all"></p><button class="btn-main" onclick="logout()" style="background:linear-gradient(90deg, #ef4444, #dc2626)">Abmelden</button><p onclick="toggleSettings()" style="cursor:pointer; opacity:0.5; margin-top:20px">Schließen</p></div></div>

    <script>
        function toggleMode() {
            const btn = document.getElementById('mainBtn');
            btn.dataset.mode = btn.dataset.mode === 'login' ? 'register' : 'login';
            btn.innerText = btn.dataset.mode === 'login' ? 'Anmelden' : 'Registrieren';
        }
    </script>
</body>
</html>
