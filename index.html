<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meine Zentrale | Pro</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234facfe%22/><text y=%22.9em%22 font-size=%2280%22 x=%22.1em%22>Z</text></svg>">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Meine%20Zentrale%22,%22short_name%22:%22Zentrale%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f172a%22,%22theme_color%22:%22%234facfe%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/5968/5968841.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeuZLf52JxlN_V3T9_sFqMDccHN8hDP9w",
            authDomain: "meine-zentrale.firebaseapp.com",
            projectId: "meine-zentrale",
            storageBucket: "meine-zentrale.firebasestorage.app",
            messagingSenderId: "1026890917523",
            appId: "1:1026890917523:web:78278ef14b8e89b0868f66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ÜBERSETZUNGSLOGIK ---
        let currentLang = 'de';
        const translations = {
            de: { title: "Meine Zentrale", login: "Anmelden", reg: "Registrieren", add: "Schnell-Links", save: "Speichern ✨", name: "Name", url: "URL", switchReg: "Noch kein Account? Registrieren", switchLog: "Bereits ein Account? Anmelden", logout: "Abmelden", settings: "Settings", forgot: "Passwort vergessen?", search: "Suche", addTile: "Hinzufügen" },
            en: { title: "My Central", login: "Login", reg: "Register", add: "Quick-Links", save: "Save ✨", name: "Name", url: "URL", switchReg: "Noch kein Account? Register", switchLog: "Already have an account? Login", logout: "Logout", settings: "Settings", forgot: "Forgot?", search: "Search", addTile: "Add Link" }
        };

        window.toggleLang = () => {
            currentLang = currentLang === 'de' ? 'en' : 'de';
            document.getElementById('langBtn').innerText = currentLang === 'de' ? '🇩🇪' : '🇺🇸';
            updateUI();
        };

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (el.tagName === 'INPUT') el.placeholder = t[key];
                else el.innerText = t[key];
            });
        }

        // --- AUTH ---
        window.handleSubmit = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const mode = document.getElementById('mainBtn').dataset.mode;
            try {
                if (mode === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };

        window.openResetModal = () => document.getElementById('resetModal').style.display = 'flex';
        window.closeResetModal = () => document.getElementById('resetModal').style.display = 'none';
        window.sendResetEmail = async () => {
            const email = document.getElementById('resetEmailInput').value;
            if (email) try { await sendPasswordResetEmail(auth, email); alert("Gesendet!"); closeResetModal(); } catch(e) { alert(e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            document.getElementById('dashboardSection').style.display = user ? 'block' : 'none';
            document.getElementById('topNav').style.display = user ? 'flex' : 'none';
            if (user) { document.getElementById('userEmailDisplay').innerText = user.email; loadLinks(user.uid); updateUI(); }
        });

        // --- FUNKTIONEN ---
        window.addFav = async () => {
            const name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            if (name && url && auth.currentUser) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const docRef = doc(db, "users", auth.currentUser.uid);
                const snap = await getDoc(docRef);
                let links = snap.exists() ? snap.data().links : [];
                links.push({ name, url });
                await setDoc(docRef, { links });
                document.getElementById('favName').value = ''; document.getElementById('favUrl').value = '';
            }
        };

        function loadLinks(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const grid = document.getElementById('dynamicGrid');
                const links = doc.exists() ? doc.data().links : [];
                grid.innerHTML = links.map((l, i) => {
                    const domain = new URL(l.url).hostname;
                    return `<div class="card"><button class="btn-del" onclick="deleteFav(${i})">×</button><a href="${l.url}" target="_blank" class="fav-link-area"><img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" class="icon"><span class="fav-label">${l.name}</span></a></div>`;
                }).join('');
            });
        }

        window.deleteFav = async (i) => {
            const docRef = doc(db, "users", auth.currentUser.uid);
            const snap = await getDoc(docRef);
            let links = snap.data().links; links.splice(i, 1);
            await setDoc(docRef, { links });
        };

        window.toggleSettings = () => {
            const m = document.getElementById('settingsModal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        };
        window.logout = () => signOut(auth);
        window.scrollToAdd = (e) => { e.preventDefault(); document.getElementById('addSection').scrollIntoView({ behavior: 'smooth' }); };
    </script>

    <style>
        /* GLOBAL RESET & FIXES */
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        /* KEINE UNTERSTRICHE / KEIN LILA */
        a, a:visited, a:hover, a:active { text-decoration: none !important; color: white !important; outline: none; }

        .top-nav { width: 100%; display: none; justify-content: flex-end; padding: 20px; gap: 20px; position: fixed; top: 0; z-index: 500; }
        
        #dashboardSection { display: none; width: 90%; max-width: 1000px; padding: 80px 0; text-align: center; }
        
        h1 { font-size: 2.2rem; margin-bottom: 30px; text-align: center; }

        /* GRID MIT PERFEKTEN ABSTÄNDEN */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-bottom: 30px; }

        /* CARDS ZENTRIERT */
        .card { background: #1e293b; border-radius: 16px; padding: 20px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.1); min-height: 120px; overflow: hidden; }
        .card::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #4facfe; }

        .fav-link-area { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .fav-label { margin-top: 10px; font-weight: bold; font-size: 1rem; text-align: center; width: 100%; display: block; }
        .icon { width: 44px; height: 44px; display: block; }

        /* LAPTOP OPTIMIERUNG */
        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 30px; }
            .card { transition: transform 0.3s, box-shadow 0.3s; }
            .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(79, 172, 254, 0.2); }
            .card::before { background: linear-gradient(90deg, #00f2fe, #4facfe); }
        }

        /* LOGIN PERFEKT ZENTRIERT */
        #authSection { height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 1000; background: #0f172a; }
        .login-card { background: #1e293b; padding: 40px 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* INPUTS ZENTRIERT */
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; font-size: 1rem; text-align: center; outline: none; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(90deg, #00f2fe, #4facfe); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        
        .add-section { background: rgba(30, 41, 59, 0.5); padding: 30px; border-radius: 20px; margin-top: 40px; }
        .btn-del { position: absolute; top: 8px; right: 8px; background: none; border: none; color: white; opacity: 0.3; cursor: pointer; font-size: 1.2rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; border: 1px solid #4facfe; }
    </style>
</head>
<body>

    <div class="top-nav" id="topNav">
        <span onclick="toggleLang()" style="cursor:pointer; font-size: 1.5rem;" id="langBtn">🇩🇪</span>
        <span onclick="toggleSettings()" style="cursor:pointer; font-size: 1.5rem;">⚙️</span>
    </div>

    <div id="authSection">
        <div class="login-card">
            <h2 data-t="login">Anmelden</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="password" placeholder="Passwort">
            <p onclick="openResetModal()" style="font-size: 0.85rem; color: #4facfe; cursor: pointer; margin: 15px 0;" data-t="forgot">Passwort vergessen?</p>
            <button class="btn-main" id="mainBtn" data-mode="login" onclick="handleSubmit()" data-t="login">Anmelden</button>
            <p id="switchMode" onclick="switchAuth()" style="cursor:pointer; font-size: 0.9rem; opacity: 0.6; margin-top: 25px;" data-t="switchReg">Noch kein Account? Registrieren</p>
        </div>
    </div>

    <div id="dashboardSection">
        <h1 data-t="title">Meine Zentrale</h1>
        
        <div class="grid">
            <a href="https://youtube.com" target="_blank" class="card">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com" class="icon">
                <span class="fav-label">YouTube</span>
            </a>
            <a href="#" onclick="scrollToAdd(event)" class="card">
                <span style="font-size: 2.2rem;">+</span>
                <span class="fav-label" data-t="addTile">Hinzufügen</span>
            </a>
            <a href="https://google.com" target="_blank" class="card">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=google.com" class="icon">
                <span class="fav-label" data-t="search">Suche</span>
            </a>
        </div>

        <div id="dynamicGrid" class="grid"></div>

        <div class="add-section" id="addSection">
            <h3 data-t="add">Schnell-Links</h3>
            <input type="text" id="favName" data-t="name" placeholder="Name">
            <input type="text" id="favUrl" data-t="url" placeholder="URL">
            <button class="btn-main" onclick="addFav()" data-t="save">Speichern ✨</button>
        </div>
    </div>

    <div id="resetModal" class="modal"><div class="modal-content"><h3>Reset</h3><input type="email" id="resetEmailInput" placeholder="E-Mail"><button class="btn-main" onclick="sendResetEmail()">Senden</button><p onclick="closeResetModal()" style="cursor:pointer; opacity:0.5; margin-top:20px">Abbrechen</p></div></div>
    
    <div id="settingsModal" class="modal"><div class="modal-content"><h2>Settings</h2><p id="userEmailDisplay" style="color:#4facfe; margin-bottom:20px"></p><button class="btn-main" onclick="logout()" style="background:#ef4444" data-t="logout">Abmelden</button><p onclick="toggleSettings()" style="cursor:pointer; opacity:0.5; margin-top:20px">Schließen</p></div></div>

    <script>
        function switchAuth() {
            const b = document.getElementById('mainBtn');
            const s = document.getElementById('switchMode');
            const t = document.querySelector('h2');
            if(b.dataset.mode === 'login') {
                b.dataset.mode = 'register'; b.innerText = translations[currentLang].reg;
                t.innerText = translations[currentLang].reg; s.innerText = translations[currentLang].switchLog;
            } else {
                b.dataset.mode = 'login'; b.innerText = translations[currentLang].login;
                t.innerText = translations[currentLang].login; s.innerText = translations[currentLang].switchReg;
            }
        }
    </script>
</body>
</html>
