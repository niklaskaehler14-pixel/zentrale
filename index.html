<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine Zentrale | Pro</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeuZLf52JxlN_V3T9_sFqMDccHN8hDP9w",
            authDomain: "meine-zentrale.firebaseapp.com",
            projectId: "meine-zentrale",
            storageBucket: "meine-zentrale.firebasestorage.app",
            messagingSenderId: "1026890917523",
            appId: "1:1026890917523:web:78278ef14b8e89b0868f66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.openResetModal = () => {
    document.getElementById('resetModal').style.display = 'flex';
};

window.closeResetModal = () => {
    document.getElementById('resetModal').style.display = 'none';
};

window.sendResetEmail = async () => {
    const email = document.getElementById('resetEmailInput').value;
    if (!email) return alert("Bitte E-Mail eingeben!");
    try {
        const actionCodeSettings = { url: window.location.href, handleCodeInApp: true };
        await sendPasswordResetEmail(auth, email, actionCodeSettings);
        alert("E-Mail gesendet! Schau in dein Postfach.");
        closeResetModal();
    } catch (e) { alert(e.message); }
};


        // --- NUR DIESE DREI FUNKTIONEN SIND NEU FÜR DAS FENSTER ---
        window.openResetModal = () => {
            document.getElementById('resetModal').style.display = 'flex';
        };

        window.closeResetModal = () => {
            document.getElementById('resetModal').style.display = 'none';
        };

        window.sendResetEmail = async () => {
            const email = document.getElementById('resetEmailInput').value;
            if (!email) return alert("Bitte E-Mail eingeben!");
            try {
                const actionCodeSettings = { url: window.location.href, handleCodeInApp: true };
                await sendPasswordResetEmail(auth, email, actionCodeSettings);
                alert("E-Mail gesendet! Check dein Postfach.");
                closeResetModal();
            } catch (e) { alert(e.message); }
        };
        // -------------------------------------------------------

        let currentLang = 'de';
        const translations = {
            de: { title: "Meine Zentrale", login: "Anmelden", reg: "Registrieren", google: "Google Login", add: "Link hinzufügen", save: "Speichern ✨", name: "Name", url: "URL", switch: "Noch kein Account? Registrieren", logout: "Abmelden", settings: "Einstellungen", search: "Suche", forgot: "Passwort vergessen?" },
            en: { title: "My Central", login: "Login", reg: "Register", google: "Google Login", add: "Add Link", save: "Save ✨", name: "Name", url: "URL", switch: "No account? Register", logout: "Logout", settings: "Settings", search: "Search", forgot: "Forgot password?" }
        };

        window.toggleLang = () => {
            currentLang = currentLang === 'de' ? 'en' : 'de';
            document.getElementById('langBtn').innerText = currentLang === 'de' ? '🇩🇪' : '🇺🇸';
            updateUI();
        };

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (el.tagName === 'INPUT') el.placeholder = t[key];
                else el.innerText = t[key];
            });
        }

        window.handleSubmit = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const mode = document.getElementById('mainBtn').dataset.mode;
            try {
                if (mode === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };
        
        window.logout = () => { signOut(auth); toggleSettings(); };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            document.getElementById('dashboardSection').style.display = user ? 'block' : 'none';
            document.getElementById('topNav').style.display = user ? 'flex' : 'none';
            if (user) { loadLinks(user.uid); }
        });

        window.addFav = async () => {
            const name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            if (name && url && auth.currentUser) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const docRef = doc(db, "users", auth.currentUser.uid);
                const snap = await getDoc(docRef);
                let links = snap.exists() ? snap.data().links : [];
                links.push({ name, url });
                await setDoc(docRef, { links });
                document.getElementById('favName').value = ''; document.getElementById('favUrl').value = '';
            }
        };

        window.deleteFav = async (index) => {
            const docRef = doc(db, "users", auth.currentUser.uid);
            const snap = await getDoc(docRef);
            let links = snap.data().links;
            links.splice(index, 1);
            await setDoc(docRef, { links });
        };

        function loadLinks(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const grid = document.getElementById('dynamicGrid');
                const links = doc.exists() ? doc.data().links : [];
                grid.innerHTML = links.map((l, i) => {
                    const domain = new URL(l.url).hostname;
                    return `
                        <div class="card custom-fav-card">
                            <button class="btn-del" onclick="deleteFav(${i})">×</button>
                            <a href="${l.url}" target="_blank" class="fav-link-area">
                                <img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" class="icon">
                                <span class="fav-label">${l.name}</span>
                            </a>
                        </div>`;
                }).join('');
            });
        }

        window.toggleSettings = () => {
            const modal = document.getElementById('settingsModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        };
    </script>

    <style>
        :root { --glow-cyan: rgba(0, 242, 254, 0.5); }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; display: none; justify-content: flex-end; padding: 15px; gap: 15px; position: fixed; top: 0; }
        #dashboardSection { display: none; width: 90%; max-width: 600px; text-align: center; padding-top: 60px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: rgba(255,255,255,0.07); border-radius: 18px; padding: 20px; text-decoration: none !important; color: white; position: relative; display: flex; flex-direction: column; align-items: center; }
        .fav-link-area { text-decoration: none !important; color: inherit; display: flex; flex-direction: column; align-items: center; }
        .fav-label { margin-top: 10px; font-weight: bold; text-decoration: none !important; }
        .icon { width: 40px; height: 40px; }
        .btn-del { position: absolute; top: 5px; right: 5px; background: none; border: none; color: white; opacity: 0.3; cursor: pointer; }
        .add-section { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-top: 30px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; background: #1e293b; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #4facfe; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #authSection { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
        .forgot-link { font-size: 0.8rem; color: #4facfe; cursor: pointer; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="top-nav" id="topNav">
        <span onclick="toggleLang()" style="cursor:pointer" id="langBtn">🇩🇪</span>
        <span onclick="toggleSettings()" style="cursor:pointer">⚙️</span>
    </div>

    <div id="authSection">
        <div class="login-card">
            <h2 data-t="login">Anmelden</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <span class="forgot-link" onclick="openResetModal()" data-t="forgot" style="cursor:pointer; color:#4facfe;">Passwort vergessen?</span>

            
            <<span class="forgot-link" onclick="openResetModal()" data-t="forgot" style="cursor:pointer; color:#4facfe;">Passwort vergessen?</span>

            
            <button class="btn-main" id="mainBtn" data-mode="login" onclick="handleSubmit()" data-t="login">Anmelden</button>
            <p onclick="toggleMode()" style="cursor:pointer; font-size: 0.8rem; opacity: 0.6;" data-t="switch">Registrieren</p>
        </div>
    </div>

    <div id="dashboardSection">
        <h1 data-t="title">Meine Zentrale</h1>
        <div id="dynamicGrid" class="grid"></div>
        <div class="add-section" id="addSection">
            <h3 data-t="add">Link hinzufügen</h3>
            <input type="text" id="favName" data-t="name" placeholder="Name">
            <input type="text" id="favUrl" data-t="url" placeholder="URL">
            <button class="btn-main" onclick="addFav()" data-t="save">Speichern ✨</button>
        </div>
    </div>

    <div id="resetModal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000;">
        <div style="background: #1e293b; padding: 30px; border-radius: 20px; width: 280px; text-align: center; border: 1px solid #4facfe;">
            <h3 style="margin-top: 0;">Passwort zurück</h3>
            <p style="font-size: 0.75rem; opacity: 0.7;">Gib deine E-Mail ein:</p>
            <input type="email" id="resetEmailInput" placeholder="E-Mail">
            <button class="btn-main" onclick="sendResetEmail()">Link senden</button>
            <p onclick="closeResetModal()" style="cursor:pointer; font-size: 0.8rem; margin-top: 15px; opacity: 0.5;">Abbrechen</p>
        </div>
    </div>

    <script>
        function toggleMode() {
            const btn = document.getElementById('mainBtn');
            btn.dataset.mode = btn.dataset.mode === 'login' ? 'register' : 'login';
            btn.innerText = btn.dataset.mode === 'login' ? 'Anmelden' : 'Registrieren';
        }
    </script>
</body>
</html>
