
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine Zentrale | Pro</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeuZLf52JxlN_V3T9_sFqMDccHN8hDP9w",
            authDomain: "meine-zentrale.firebaseapp.com",
            projectId: "meine-zentrale",
            storageBucket: "meine-zentrale.firebasestorage.app",
            messagingSenderId: "1026890917523",
            appId: "1:1026890917523:web:78278ef14b8e89b0868f66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentLang = 'de';
        const translations = {
            de: { title: "Meine Zentrale", login: "Anmelden", reg: "Registrieren", google: "Google Login", add: "Link hinzufügen", save: "Speichern ✨", name: "Name", url: "URL", switch: "Noch kein Account? Registrieren", logout: "Abmelden", settings: "Einstellungen", search: "Suche" },
            en: { title: "My Central", login: "Login", reg: "Register", google: "Google Login", add: "Add Link", save: "Save ✨", name: "Name", url: "URL", switch: "No account? Register", logout: "Logout", settings: "Settings", search: "Search" }
        };

        window.toggleLang = () => {
            currentLang = currentLang === 'de' ? 'en' : 'de';
            document.getElementById('langBtn').innerText = currentLang === 'de' ? '🇩🇪' : '🇺🇸';
            updateUI();
        };

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (el.tagName === 'INPUT') el.placeholder = t[key];
                else el.innerText = t[key];
            });
        }

        // SMOOTH SCROLL FUNKTION
        window.scrollToAdd = (e) => {
            e.preventDefault();
            document.getElementById('addSection').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('favName').focus();
        };

        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, provider); } catch (e) { alert(e.message); } };
        window.handleSubmit = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const mode = document.getElementById('mainBtn').dataset.mode;
            try {
                if (mode === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };
        window.logout = () => { signOut(auth); toggleSettings(); };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('authSection').style.display = user ? 'none' : 'flex';
            document.getElementById('dashboardSection').style.display = user ? 'block' : 'none';
            document.getElementById('topNav').style.display = user ? 'flex' : 'none';
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                loadLinks(user.uid);
            }
        });

        window.addFav = async () => {
            const name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            if (name && url && auth.currentUser) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const docRef = doc(db, "users", auth.currentUser.uid);
                const snap = await getDoc(docRef);
                let links = snap.exists() ? snap.data().links : [];
                links.push({ name, url });
                await setDoc(docRef, { links });
                document.getElementById('favName').value = ''; document.getElementById('favUrl').value = '';
            }
        };

        window.deleteFav = async (index) => {
            const docRef = doc(db, "users", auth.currentUser.uid);
            const snap = await getDoc(docRef);
            let links = snap.data().links;
            links.splice(index, 1);
            await setDoc(docRef, { links });
        };

        function loadLinks(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const grid = document.getElementById('dynamicGrid');
                const links = doc.exists() ? doc.data().links : [];
                grid.innerHTML = links.map((l, i) => {
                    const domain = new URL(l.url).hostname;
                    return `
                        <div class="card custom-fav-card">
                            <button class="btn-del" onclick="deleteFav(${i})">×</button>
                            <a href="${l.url}" target="_blank" class="fav-content">
                                <img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" class="icon">
                                <span class="fav-label">${l.name}</span>
                            </a>
                        </div>`;
                }).join('');
            });
        }

        window.toggleSettings = () => {
            const modal = document.getElementById('settingsModal');
            if (modal.style.display === 'flex') {
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 300);
            } else {
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
            }
        };
    </script>

    <style>
        :root {
            --glow-cyan: rgba(0, 242, 254, 0.5);
            --glow-red: rgba(255, 60, 60, 0.5);
            --glow-green: rgba(60, 255, 60, 0.4);
        }

        html { scroll-behavior: smooth; } /* Globales Smooth Scrolling */

        body {
            margin: 0; background: #0f172a; color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .top-nav {
            width: 100%; display: none; justify-content: flex-end; padding: 15px; gap: 15px; box-sizing: border-box;
            position: fixed; top: 0; z-index: 100;
        }
        .nav-icon { font-size: 1.5rem; cursor: pointer; opacity: 0.7; transition: 0.3s; }

        #dashboardSection { display: none; width: 90%; max-width: 600px; text-align: center; padding-top: 60px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        /* ANIMATIONEN WIEDER DA */
        .card {
            background: rgba(255,255,255,0.07); border-radius: 18px; padding: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            text-decoration: none; color: white; position: relative; border-bottom: 3px solid transparent;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .card:hover { transform: translateY(-8px) scale(1.02); background: rgba(255,255,255,0.12); }

        .yt { border-color: #ff4444; }
        .yt:hover { box-shadow: 0 10px 25px var(--glow-red); }
        .tool { border-color: #4facfe; }
        .tool:hover { box-shadow: 0 10px 25px var(--glow-cyan); }
        .search { border-color: #00ff88; }
        .search:hover { box-shadow: 0 10px 25px var(--glow-green); }

        .custom-fav-card {
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .custom-fav-card:hover { border-color: var(--glow-cyan); box-shadow: 0 8px 20px var(--glow-cyan); }

        .fav-content { text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .fav-label { margin-top: 8px; font-weight: bold; font-size: 0.9rem; }

        .icon { width: 45px; height: 45px; object-fit: contain; }
        .btn-del { position: absolute; top: 5px; right: 8px; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 1.2rem; z-index: 10; }

        /* Settings Animation */
        #settingsModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(0px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; transition: 0.3s ease;
        }
        #settingsModal.active { opacity: 1; backdrop-filter: blur(8px); }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 25px; width: 280px; text-align: center; transform: scale(0.8); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #settingsModal.active .modal-content { transform: scale(1); }

        .add-section { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; margin: 40px 0; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #1e293b; color: white; box-sizing: border-box; outline: none; border: 1px solid transparent; transition: 0.3s; }
        input:focus { border-color: var(--glow-cyan); box-shadow: 0 0 10px var(--glow-cyan); }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #4facfe; color: white; font-weight: bold; cursor: pointer; }

        #authSection { height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .login-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-nav" id="topNav">
        <span class="nav-icon" id="langBtn" onclick="toggleLang()">🇩🇪</span>
        <span class="nav-icon" onclick="toggleSettings()">⚙️</span>
    </div>

    <div id="authSection">
        <div class="login-card">
            <h2 data-t="login">Anmelden</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="password" placeholder="Passwort">
            <button class="btn-main" id="mainBtn" data-mode="login" onclick="handleSubmit()" data-t="login">Anmelden</button>
            <button class="btn-main" style="background:white; color:#333; margin-top:10px;" onclick="loginWithGoogle()">Google Login</button>
            <p onclick="toggleMode()" id="switchBtn" style="cursor:pointer; font-size: 0.8rem; margin-top: 15px; opacity: 0.6;" data-t="switch">Noch kein Account? Registrieren</p>
        </div>
    </div>

    <div id="dashboardSection">
        <h1 data-t="title">Meine Zentrale</h1>

        <div class="grid">
            <a href="https://youtube.com" target="_blank" class="card yt">
                <img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com" class="icon">
                <span>YouTube</span>
            </a>
            <a href="https://ublockorigin.com" target="_blank" class="card tool">
                <img src="https://www.google.com/s2/favicons?sz=64&domain=ublockorigin.com" class="icon">
                <span>uBlock</span>
            </a>
            <a href="#addSection" class="card tool" onclick="scrollToAdd(event)">
                <span style="font-size: 1.5rem;">+</span>
                <span data-t="add">Link hinzufügen</span>
            </a>
            <a href="https://google.com" target="_blank" class="card search">
                <img src="https://www.google.com/s2/favicons?sz=64&domain=google.com" class="icon">
                <span data-t="search">Suche</span>
            </a>
        </div>

        <div id="dynamicGrid" class="grid"></div>

        <div class="add-section" id="addSection">
            <h3 data-t="add">Schnell-Links speichern</h3>
            <input type="text" id="favName" data-t="name" placeholder="Name">
            <input type="text" id="favUrl" data-t="url" placeholder="URL">
            <button class="btn-main" onclick="addFav()" data-t="save">Speichern ✨</button>
        </div>
    </div>

    <div id="settingsModal" onclick="if(event.target == this) toggleSettings()">
        <div class="modal-content">
            <h3 data-t="settings">Einstellungen</h3>
            <p id="userEmail" style="opacity: 0.6;"></p>
            <button class="btn-main" style="background: #ef4444;" onclick="logout()" data-t="logout">Abmelden</button>
        </div>
    </div>

    <script>
        function toggleMode() {
            const btn = document.getElementById('mainBtn');
            btn.dataset.mode = btn.dataset.mode === 'login' ? 'register' : 'login';
            btn.innerText = btn.dataset.mode === 'login' ? translations[currentLang].login : translations[currentLang].reg;
        }
    </script>
</body>
</html>
