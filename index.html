<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine Zentrale | Cloud</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // DEINE FIREBASE DATEN (Direkt aus deinem Screenshot)
        const firebaseConfig = {
            apiKey: "AIzaSyCeuZLf52JxlN_V3T9_sFqMDccHN8hDP9w",
            authDomain: "meine-zentrale.firebaseapp.com",
            projectId: "meine-zentrale",
            storageBucket: "meine-zentrale.firebasestorage.app",
            messagingSenderId: "1026890917523",
            appId: "1:1026890917523:web:78278ef14b8e89b0868f66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH LOGIK ---
        window.handleSubmit = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const mode = document.getElementById('mainBtn').dataset.mode;

            if (!email || !pass) return alert("Felder ausfüllen, Bro!");

            try {
                if (mode === 'register') {
                    const confirmPass = document.getElementById('confirmPassword').value;
                    if (pass !== confirmPass) return alert("Passwörter ungleich!");
                    await createUserWithEmailAndPassword(auth, email, pass);
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (error) {
                alert("Fehler: " + error.message);
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'flex';
                loadLinks(user.uid);
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });

        // --- LINK LOGIK (CLOUD SYNC) ---
        window.addFav = async () => {
            const name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            const user = auth.currentUser;

            if (name && url && user) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const docRef = doc(db, "users", user.uid);
                const snapshot = await getDoc(docRef);
                let favorites = snapshot.exists() ? snapshot.data().links : [];
                favorites.push({ name, url });
                await setDoc(docRef, { links: favorites });
                document.getElementById('favName').value = '';
                document.getElementById('favUrl').value = '';
            }
        };

        window.deleteFav = async (index) => {
            const user = auth.currentUser;
            const docRef = doc(db, "users", user.uid);
            const snapshot = await getDoc(docRef);
            let favorites = snapshot.data().links;
            favorites.splice(index, 1);
            await setDoc(docRef, { links: favorites });
        };

        function loadLinks(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const grid = document.getElementById('favGrid');
                const favorites = doc.exists() ? doc.data().links : [];
                grid.innerHTML = favorites.map((fav, index) => {
                    const domain = new URL(fav.url).hostname;
                    return `
                        <div class="fav-card-item">
                            <button class="btn-del" onclick="deleteFav(${index})">×</button>
                            <a href="${fav.url}" target="_blank" class="fav-link">
                                <img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="favicon">
                                <span>${fav.name}</span>
                            </a>
                        </div>
                    `;
                }).join('');
            });
        }
    </script>

    <style>
        /* HIER BLEIBT DEIN KOMPLETTES DESIGN (Dunkel, Glow, Hover) */
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg-dark: #05070a; --tool-glow: rgba(0, 242, 254, 0.4); }
        body { margin: 0; background: radial-gradient(circle at top right, #1e293b, #0f172a, #05070a) no-repeat center center fixed; background-size: cover; font-family: sans-serif; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Auth Styles */
        #authSection { flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; }
        .auth-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--tool-glow); }
        .btn-action { width: 100%; padding: 14px; background: linear-gradient(to right, var(--primary), var(--secondary)); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Dashboard Styles */
        #dashboardSection { display: none; flex-direction: column; align-items: center; width: 100%; padding: 20px; box-sizing: border-box; }
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; margin: 20px 0; }
        .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; width: 100%; max-width: 600px; }
        .card, .fav-card-item { background: rgba(255,255,255,0.05); border-radius: 18px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.3s; text-decoration: none; color: white; }
        .card:hover, .fav-card-item:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 5px 20px var(--tool-glow); }
        .btn-del { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; cursor: pointer; width: 20px; height: 20px; font-size: 12px; }
        .favicon { width: 30px; height: 30px; margin-bottom: 5px; border-radius: 5px; }
        .fav-link { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; font-size: 0.9rem; }
        .btn-logout { margin-top: 30px; opacity: 0.5; cursor: pointer; background: none; border: 1px solid white; color: white; padding: 5px 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-box">
            <h2 id="formTitle">Zentrale Login 🛡️</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="password" placeholder="Passwort">
            <div id="confirmPassGroup" style="display:none;">
                <input type="password" id="confirmPassword" placeholder="Wiederholen">
            </div>
            <button class="btn-action" id="mainBtn" data-mode="login" onclick="handleSubmit()">Anmelden ✨</button>
            <p id="switchBtn" style="cursor:pointer; font-size: 0.8rem; margin-top: 15px;" onclick="toggleMode()">Noch kein Account? Registrieren</p>
        </div>
    </div>

    <div id="dashboardSection">
        <h1>Meine Zentrale</h1>
        <div class="main-grid">
            <a href="https://youtube.com" target="_blank" class="card" style="border-bottom: 3px solid red;">YouTube</a>
            <a href="https://google.com" target="_blank" class="card" style="border-bottom: 3px solid green;">Google</a>
        </div>

        <div id="favGrid" class="fav-grid"></div>

        <div style="margin-top: 40px; width: 100%; max-width: 600px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px;">
            <input type="text" id="favName" placeholder="Name">
            <input type="text" id="favUrl" placeholder="URL">
            <button class="btn-action" onclick="addFav()">Link speichern 📥</button>
        </div>

        <button class="btn-logout" onclick="logout()">Abmelden</button>
    </div>

    <script>
        function toggleMode() {
            const mode = document.getElementById('mainBtn').dataset.mode;
            if(mode === 'login') {
                document.getElementById('mainBtn').dataset.mode = 'register';
                document.getElementById('mainBtn').innerText = 'Account erstellen ✨';
                document.getElementById('formTitle').innerText = 'Registrieren';
                document.getElementById('confirmPassGroup').style.display = 'block';
                document.getElementById('switchBtn').innerText = 'Bereits dabei? Login';
            } else {
                document.getElementById('mainBtn').dataset.mode = 'login';
                document.getElementById('mainBtn').innerText = 'Anmelden ✨';
                document.getElementById('formTitle').innerText = 'Zentrale Login 🛡️';
                document.getElementById('confirmPassGroup').style.display = 'none';
                document.getElementById('switchBtn').innerText = 'Noch kein Account? Registrieren';
            }
        }
    </script>
</body>
</html>
