<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine Zentrale</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #05070a;
            --bg-medium: #0f172a;
            --bg-light: #1e293b;
            --yt-glow: rgba(255, 0, 0, 0.4);
            --tool-glow: rgba(0, 242, 254, 0.4);
        }

        /* PERFORMANCE BOOST: Verhindert Ruckeln beim Scrollen */
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            background-color: var(--bg-dark);
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding: 15px; box-sizing: border-box;
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-medium), var(--bg-dark)) no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; color: white;
            position: relative; overflow-x: hidden;
            transform: translateZ(0); /* Aktiviert GPU-Beschleunigung */
        }

        /* Prank Overlay */
        #prankOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }

        .settings-prank {
            position: absolute; top: 22px; right: 85px;
            font-size: 16px; color: rgba(255, 255, 255, 0.05);
            cursor: pointer; z-index: 1000;
        }

        /* ANIMATION FÜR SPRACHE */
        .lang-switch {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.07);
            padding: 8px 12px; border-radius: 10px;
            cursor: pointer; backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            font-size: 14px; z-index: 100;
            transition: all 0.3s ease;
        }
        .lang-switch:active { transform: scale(0.9); }
        
        #langText { display: inline-block; transition: all 0.3s ease; }
        .fade-out { opacity: 0; transform: translateY(-10px); }
        .fade-in { opacity: 1; transform: translateY(0); }

        h1 { 
            margin-top: 60px; font-weight: 300; letter-spacing: 2px; text-align: center;
            font-size: 1.8rem; text-shadow: 0 0 15px var(--tool-glow);
        }

        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; margin: 20px 0; }
        .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; width: 100%; max-width: 600px; margin-bottom: 30px; }

        @media (max-width: 480px) { 
            .main-grid { grid-template-columns: 1fr; } 
            .fav-grid { grid-template-columns: repeat(2, 1fr); }
            /* Weniger Blur auf Handy für mehr FPS */
            .card, .fav-card-item { backdrop-filter: blur(5px) !important; }
        }

        .card, .fav-card-item {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px; padding: 18px;
            text-align: center; color: white; font-weight: bold;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px;
            text-decoration: none;
            will-change: transform; /* Sagt dem Browser: Das hier wird sich bewegen */
        }

        .yt-card:hover { border-color: #ff0000; box-shadow: 0 10px 25px var(--yt-glow); transform: translateY(-3px); }
        .tool-card:hover { border-color: var(--primary); box-shadow: 0 10px 25px var(--tool-glow); transform: translateY(-3px); }
        .card:active { transform: scale(0.96); }

        .favicon { width: 30px; height: 30px; border-radius: 6px; pointer-events: none; }
        .yt-card { border-bottom: 3px solid #ff0000; }
        .ublock-card { border-bottom: 3px solid #800000; }
        .tool-card { border-bottom: 3px solid var(--primary); }
        .search-card { border-bottom: 3px solid #00ff88; }

        .manager-section {
            width: 100%; max-width: 600px; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.02); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 50px;
        }

        input { 
            padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; width: 100%; box-sizing: border-box;
            font-size: 16px; outline: none; -webkit-appearance: none;
        }

        .btn-add {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none; padding: 14px; border-radius: 10px; color: #0b0e14;
            font-weight: bold; width: 100%; font-size: 16px;
        }

        .btn-del {
            position: absolute; top: 5px; right: 5px;
            background: rgba(233, 69, 96, 0.9); border: none; 
            border-radius: 50%; color: white; width: 22px; height: 22px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="settings-prank" onclick="startPrank()">⚙️</div>

    <div id="prankOverlay">
        <iframe id="prankVideo" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <button onclick="stopPrank()" style="position:absolute; top:20px; right:20px; background:white; border:none; padding:10px; border-radius:10px; opacity: 0.5;">X</button>
    </div>

    <div class="lang-switch" onclick="toggleLang()">
        <span id="langText">🇩🇪 DE</span>
    </div>

    <h1 id="title">Meine Zentrale</h1>

    <div class="main-grid">
        <a href="https://www.youtube.com" target="_blank" class="card yt-card">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com" class="favicon">
            YouTube
        </a>
        <a href="https://ublockorigin.com/" target="_blank" class="card ublock-card">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=ublockorigin.com" class="favicon">
            uBlock
        </a>
        <div onclick="document.getElementById('favName').focus();" class="card tool-card">
            <span>➕</span>
            <span id="btnAddLink">Link dazu</span>
        </div>
        <a href="https://google.com" target="_blank" class="card search-card">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=google.com" class="favicon">
            <span id="btnSearch">Suche</span>
        </a>
    </div>

    <div id="favGrid" class="fav-grid"></div>

    <div class="manager-section">
        <h3 id="managerTitle" style="margin-top:0;">Schnell-Links speichern</h3>
        <input type="text" id="favName" placeholder="Name">
        <input type="text" id="favUrl" placeholder="URL">
        <button class="btn-add" id="btnAddSubmit" onclick="addFav()">Hinzufügen</button>
    </div>

    <script>
        function startPrank() {
            document.getElementById('prankVideo').src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
            document.getElementById('prankOverlay').style.display = 'block';
        }
        function stopPrank() {
            document.getElementById('prankVideo').src = "";
            document.getElementById('prankOverlay').style.display = 'none';
        }

        let currentLang = 'de';
        const texts = {
            de: { title: "Meine Zentrale", addLink: "Link dazu", search: "Suche", manager: "Schnell-Links speichern", submit: "Hinzufügen", btn: "🇩🇪 DE" },
            en: { title: "My Central", addLink: "Add Link", search: "Search", manager: "Save Quick-Links", submit: "Add now", btn: "🇺🇸 EN" }
        };

        function toggleLang() {
            const el = document.getElementById('langText');
            el.classList.add('fade-out');
            
            setTimeout(() => {
                currentLang = currentLang === 'de' ? 'en' : 'de';
                const t = texts[currentLang];
                document.getElementById('title').innerText = t.title;
                document.getElementById('btnAddLink').innerText = t.addLink;
                document.getElementById('btnSearch').innerText = t.search;
                document.getElementById('managerTitle').innerText = t.manager;
                document.getElementById('btnAddSubmit').innerText = t.submit;
                el.innerText = t.btn;
                
                el.classList.remove('fade-out');
                el.classList.add('fade-in');
                setTimeout(() => el.classList.remove('fade-in'), 300);
            }, 300);
        }

        document.addEventListener('DOMContentLoaded', displayFavs);

        function addFav() {
            let name = document.getElementById('favName').value;
            let url = document.getElementById('favUrl').value;
            if (name && url) {
                if (!url.startsWith('http')) url = 'https://' + url;
                const favorites = JSON.parse(localStorage.getItem('myCentralFavs') || '[]');
                favorites.push({ name, url });
                localStorage.setItem('myCentralFavs', JSON.stringify(favorites));
                document.getElementById('favName').value = '';
                document.getElementById('favUrl').value = '';
                displayFavs();
            }
        }

        function displayFavs() {
            const grid = document.getElementById('favGrid');
            const favorites = JSON.parse(localStorage.getItem('myCentralFavs') || '[]');
            grid.innerHTML = favorites.map((fav, index) => {
                const domain = new URL(fav.url).hostname;
                return `
                    <div class="fav-card-item">
                        <button class="btn-del" onclick="deleteFav(${index})">×</button>
                        <a href="${fav.url}" target="_blank" style="text-decoration:none; color:white; display:flex; flex-direction:column; align-items:center; gap:8px;">
                            <img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="favicon" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=google.com'">
                            <span style="font-size: 0.85rem; opacity: 0.9;">${fav.name}</span>
                        </a>
                    </div>
                `;
            }).join('');
        }

        function deleteFav(index) {
            const favorites = JSON.parse(localStorage.getItem('myCentralFavs') || '[]');
            favorites.splice(index, 1);
            localStorage.setItem('myCentralFavs', JSON.stringify(favorites));
            displayFavs();
        }
    </script>
</body>
</html>
